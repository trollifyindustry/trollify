<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Subscription</title>

<style>
body{background:#020617;color:white;font-family:sans-serif;padding:20px;}
.card{background:#1e293b;padding:20px;border-radius:12px;max-width:400px;margin:auto;}
input,select{width:100%;padding:10px;margin-top:10px;background:#020617;color:white;border:1px solid #334155;}
.services{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.service{padding:10px;background:#0f172a;border-radius:10px;cursor:pointer;text-align:center;}
.service.active{background:#9333ea;}
button{width:100%;padding:12px;margin-top:15px;background:#22c55e;border:none;}
</style>
</head>

<body>

<div class="card">

<h2>Choose Plan</h2>

<input id="cid" placeholder="Customer ID">

<select id="plan" onchange="calc()">
<option value="Basic">Basic ₹49/month</option>
<option value="Purple">Purple Plan</option>
</select>

<input id="students" type="number" placeholder="Students" oninput="calc()">

<div id="services" class="services"></div>

<p>Total: ₹<span id="total">0</span></p>

<button onclick="pay()">Pay Now</button>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

const SCRIPT = "https://script.google.com/macros/s/AKfycbzlhie-ZjSeUEBAmYTUtOalT34wFLddIWBXbpobUAYmSBR-1woEghvSHMeLlF6mja1L/exec";
const KEY = "rzp_test_SgbaNVkd8iQjXE";

let services = [
["Image Hosting",0],
["Student Add",0],
["Student Update",0],
["Previous Marksheet",0],
["Admit Card",1],
["Marksheet Generate",7],
["Marksheet Printing",13],
["Fee Card Generator",5],
["Dashboard",0],
["Website Dev",149]
];

let selected=[];

services.forEach((s,i)=>{
 document.getElementById("services").innerHTML+=
 `<div class="service" onclick="toggle(${i})">${s[0]}<br>₹${s[1]}</div>`;
});

function toggle(i){
 let el=document.getElementsByClassName("service")[i];
 el.classList.toggle("active");
 selected.includes(i)?selected=selected.filter(x=>x!=i):selected.push(i);
 calc();
}

function calc(){
 let st = parseInt(document.getElementById("students").value)||0;
 let plan=document.getElementById("plan").value;
 let total=0;

 if(plan==="Basic") total+=49;

 selected.forEach(i=>{
 let p=services[i][1];
 if(p==149) total+=149;
 else total+=p*st;
 });

 document.getElementById("total").innerText=total;
}

function pay(){
 let id=document.getElementById("cid").value;
 let total=document.getElementById("total").innerText;

 if(!id) return alert("Enter ID");
 if(total<=0) return alert("Select service");

 new Razorpay({
 key:KEY,
 amount:total*100,
 handler:(res)=>save(res.razorpay_payment_id)
 }).open();
}

function save(pid){

 let today=new Date();
 let expiry=new Date();
 expiry.setFullYear(today.getFullYear()+1);

 let data={
 id:cid.value,
 plan:plan.value,
 students:students.value,
 services:selected.map(i=>services[i][0]).join(","),
 amount:total.innerText,
 activeDate:today,
 expiryDate:expiry,
 paymentId:pid,
 buyDate:today
 };

 fetch(SCRIPT,{method:"POST",body:JSON.stringify(data)})
 .then(()=>alert("Plan Activated"));

}

</script>
</body>
</html>
